<article class="post-shell">
  {{postNavTop}}
  <header class="post-hero reveal-on-scroll">
    <div class="eyebrow-row">
      <span class="kind-pill">{{postKind}}</span>
      <span class="filename-pill">{{postFilename}}</span>
    </div>
    <h1>{{postTitle}}</h1>
    {{postMetaPrimary}}
    {{postMetaSecondary}}
    <p class="tag-row">{{postTags}}</p>
    {{postCover}}
  </header>
  <div class="article-body reveal-on-scroll">
    {{postBody}}
  </div>
  {{postNavBottom}}
</article>
