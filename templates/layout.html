<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{title}}</title>
    <meta name="description" content="{{description}}">
    <link rel="canonical" href="{{canonicalUrl}}">
    <script>
      document.documentElement.classList.add("js");
      try {
        const savedTheme = localStorage.getItem("blog-theme");
        if (savedTheme) {
          document.documentElement.dataset.theme = savedTheme;
        }
      } catch {}
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    >
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
    >
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism.min.css"
    >
    <link rel="stylesheet" href="{{sitePath}}/assets/css/site.css">
    {{head}}
  </head>
  <body data-site-path="{{sitePath}}">
    <main class="container">
      <nav>
        <ul>
          <li><strong><a href="{{sitePath}}/">{{siteName}}</a></strong></li>
        </ul>
        <ul>
          <li><a href="{{sitePath}}/">Home</a></li>
          <li class="theme-switcher" aria-label="Theme switcher">
            <button class="theme-chip" type="button" data-theme-option="sand">Sand</button>
            <button class="theme-chip" type="button" data-theme-option="slate">Slate</button>
            <button class="theme-chip" type="button" data-theme-option="paper">Paper</button>
          </li>
        </ul>
      </nav>
      {{content}}
      <footer>
        <small>&copy; {{year}} {{siteName}}</small>
      </footer>
    </main>
    <button class="scroll-top-button" type="button" aria-label="Scroll to top">Top</button>
    <script src="https://cdn.jsdelivr.net/npm/lunr/lunr.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  </body>
</html>
